---
# Kubernetes
k8s_version: "1.29"
pod_network_cidr: "10.244.0.0/16"

# CNCF Distribution registry + Joxit UI
registry_version: "3.1.1"
registry_port: 5000
registry_ui_port: 5080
registry_compose_dir: "{{ ansible_facts['env']['HOME'] }}/.registry"
registry_data_dir: "{{ ansible_facts['env']['HOME'] }}/.registry/data"

# SSH key used to connect to Multipass VMs.
# The corresponding public key must be authorized on the VMs.
# Multipass injects ~/.ssh/id_rsa.pub by default; adjust if you use a different key.
#
# Alternative — Multipass system key (Linux snap):
#   /var/snap/multipass/common/data/multipassd/ssh-keys/id_rsa
# Alternative — Multipass system key (macOS):
#   /var/root/Library/Application Support/multipassd/ssh-keys/id_rsa
multipass_ssh_key: "~/.ssh/ansible"

# Ubuntu release image for Multipass VMs
multipass_ubuntu_release: "24.04"

# VM definitions
multipass_vms:
  - name: control-plane
    cpus: 2
    mem: 4G
    disk: 20G
  - name: worker1
    cpus: 2
    mem: 2G
    disk: 15G
  - name: worker2
    cpus: 2
    mem: 2G
    disk: 15G
