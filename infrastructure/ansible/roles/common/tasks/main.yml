---
# ---------------------------------------------------------------------------
# 1. Disable swap (required by Kubernetes)
# ---------------------------------------------------------------------------
- name: Disable swap in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'
  tags: [cluster]

- name: Disable swap at runtime
  ansible.builtin.command: swapoff -a
  changed_when: false
  tags: [cluster]

# ---------------------------------------------------------------------------
# 2. Load required kernel modules persistently
# ---------------------------------------------------------------------------
- name: Configure kernel modules to load at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"
  tags: [cluster]

- name: Load overlay module now
  ansible.builtin.command: modprobe overlay
  changed_when: false
  tags: [cluster]

- name: Load br_netfilter module now
  ansible.builtin.command: modprobe br_netfilter
  changed_when: false
  tags: [cluster]

# ---------------------------------------------------------------------------
# 3. Configure sysctl for Kubernetes networking
# ---------------------------------------------------------------------------
- name: Write Kubernetes sysctl settings
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    mode: "0644"
  tags: [cluster]

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false
  tags: [cluster]

# ---------------------------------------------------------------------------
# 4. Install prerequisite packages
# ---------------------------------------------------------------------------
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [cluster]
