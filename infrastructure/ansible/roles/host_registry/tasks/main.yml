---
# ---------------------------------------------------------------------------
# 1. Detect the host IP that Multipass VMs use to reach the host machine
# ---------------------------------------------------------------------------
- name: Get bridge IP on Linux (mpqemubr0)
  ansible.builtin.command: ip -json addr show mpqemubr0
  register: host_registry_linux_bridge
  changed_when: false
  failed_when: false
  when: ansible_facts['system'] == 'Linux'
  tags: [registry]

- name: Get primary IP on macOS (en0)
  ansible.builtin.command: ipconfig getifaddr en0
  register: host_registry_macos_ip
  changed_when: false
  failed_when: false
  when: ansible_facts['system'] == 'Darwin'
  tags: [registry]

- name: Set host_registry_host_ip fact (Linux)
  ansible.builtin.set_fact:
    host_registry_host_ip: >-
      {{ (host_registry_linux_bridge.stdout | from_json)[0].addr_info
         | selectattr('family', 'equalto', 'inet')
         | map(attribute='local')
         | first }}
    cacheable: true
  when: ansible_facts['system'] == 'Linux'
  tags: [registry]

- name: Set host_registry_host_ip fact (macOS)
  ansible.builtin.set_fact:
    host_registry_host_ip: "{{ host_registry_macos_ip.stdout | trim }}"
    cacheable: true
  when: ansible_facts['system'] == 'Darwin'
  tags: [registry]

- name: Show detected registry host IP
  ansible.builtin.debug:
    msg: "Registry will be accessible at {{ host_registry_host_ip }}:{{ registry_port }} (UI at :{{ registry_ui_port }})"
  tags: [registry]

# ---------------------------------------------------------------------------
# 2. Install Docker (Linux only — macOS users should have Docker Desktop)
# ---------------------------------------------------------------------------
- name: Check if Docker is already installed (Linux)
  ansible.builtin.command: docker info
  register: host_registry_docker_info
  changed_when: false
  failed_when: false
  when: ansible_facts['system'] == 'Linux'
  tags: [registry]

- name: Install Docker and Docker Compose plugin (Linux)
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-plugin
    state: present
    update_cache: true
  when:
    - ansible_facts['system'] == 'Linux'
    - host_registry_docker_info.rc != 0
  tags: [registry]

- name: Ensure Docker service is running (Linux)
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  when: ansible_facts['system'] == 'Linux'
  tags: [registry]

- name: Notice — macOS Docker Desktop required
  ansible.builtin.debug:
    msg: "macOS detected: ensure Docker Desktop is running before continuing."
  when: ansible_facts['system'] == 'Darwin'
  tags: [registry]

# ---------------------------------------------------------------------------
# 3. Create directories and render configuration
# ---------------------------------------------------------------------------
- name: Create registry compose and data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ registry_compose_dir }}"
    - "{{ registry_data_dir }}"
  tags: [registry]

- name: Template registry config.yml
  ansible.builtin.template:
    src: registry-config.yml.j2
    dest: "{{ registry_compose_dir }}/config.yml"
    mode: "0644"
  notify: Restart registry
  tags: [registry]

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ registry_compose_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart registry
  tags: [registry]

# ---------------------------------------------------------------------------
# 4. Start the registry stack (idempotent — skip if registry is already up)
# ---------------------------------------------------------------------------
- name: Check if registry container is running
  ansible.builtin.command: docker inspect --format "{{ '{{' }}.State.Running{{ '}}' }}" registry
  register: host_registry_container_running
  changed_when: false
  failed_when: false
  tags: [registry]

- name: Start registry stack with Docker Compose
  ansible.builtin.command: >
    docker compose -f {{ registry_compose_dir }}/docker-compose.yml up -d --pull missing
  when: >
    host_registry_container_running.rc != 0 or
    host_registry_container_running.stdout | trim != 'true'
  changed_when: >
    host_registry_container_running.rc != 0 or
    host_registry_container_running.stdout | trim != 'true'
  tags: [registry]

# ---------------------------------------------------------------------------
# 5. Wait for the registry to be reachable
# ---------------------------------------------------------------------------
- name: Wait for registry /v2/ endpoint to be reachable
  ansible.builtin.uri:
    url: "http://{{ host_registry_host_ip }}:{{ registry_port }}/v2/"
    status_code: [200]
  register: host_registry_health
  until: host_registry_health.status == 200
  retries: 30
  delay: 5
  tags: [registry]
