---
# ---------------------------------------------------------------------------
# 1. Add the Kubernetes apt repository
# ---------------------------------------------------------------------------
- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: [cluster]

- name: Download and dearmor Kubernetes GPG key
  ansible.builtin.shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key \
      | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  tags: [cluster]

- name: Add Kubernetes apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
    mode: "0644"
  tags: [cluster]

# ---------------------------------------------------------------------------
# 2. Install kubeadm, kubelet, kubectl
# ---------------------------------------------------------------------------
- name: Install Kubernetes packages
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true
  tags: [cluster]

- name: Hold Kubernetes packages at current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  tags: [cluster]

# ---------------------------------------------------------------------------
# 3. Enable kubelet
# kubelet will crash-loop until kubeadm init/join completes — this is normal.
# ---------------------------------------------------------------------------
- name: Enable and start kubelet
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started
  tags: [cluster]
