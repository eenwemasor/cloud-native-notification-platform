---
# Play 1: Deploy CNCF Distribution registry + Joxit UI on the host machine
- name: Setup host registry
  hosts: local
  gather_facts: true
  roles:
    - role: host_registry
      tags: [registry]

# Play 2: Provision Multipass VMs and populate dynamic inventory
# Must run after Play 1 so host_registry_host_ip is available in hostvars['localhost']
- name: Provision Multipass VMs
  hosts: local
  gather_facts: false
  roles:
    - role: multipass_vms
      tags: [vms]

# Play 3: Configure all cluster nodes in parallel
# Targets k8s_cluster which is resolved from control_plane + workers groups
# populated by add_host calls in Play 2.
- name: Configure all cluster nodes
  hosts: k8s_cluster
  gather_facts: true
  become: true
  serial: 0
  roles:
    - role: common
      tags: [cluster]
    - role: containerd
      tags: [cluster]
    - role: kubernetes
      tags: [cluster]

# Play 4: Initialize the Kubernetes control plane
- name: Initialize control plane
  hosts: control_plane
  gather_facts: true
  become: true
  roles:
    - role: control_plane
      tags: [control-plane]

# Play 5: Join worker nodes to the cluster
# Depends on Play 4 having stored the join command via add_host dummy host 'cluster-facts'
- name: Join worker nodes
  hosts: workers
  gather_facts: true
  become: true
  roles:
    - role: worker
      tags: [workers]

# Play 6: Merge the cluster kubeconfig into the host's ~/.kube/config
# Depends on Play 4 having fetched the kubeconfig to ~/.kube/config-multipass.
# After this play, `kubectl get nodes` works from the host without extra flags.
- name: Configure host kubectl
  hosts: local
  gather_facts: false
  vars:
    kubeconfig_dir: "{{ lookup('env', 'HOME') }}/.kube"
  tasks:
    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ kubeconfig_dir }}"
        state: directory
        mode: "0700"
      tags: [kubeconfig]

    - name: Merge multipass kubeconfig into ~/.kube/config
      ansible.builtin.shell: |
        KUBECONFIG="{{ kubeconfig_dir }}/config:{{ kubeconfig_dir }}/config-multipass" \
          kubectl config view --flatten > "{{ kubeconfig_dir }}/config.merge-tmp"
        mv "{{ kubeconfig_dir }}/config.merge-tmp" "{{ kubeconfig_dir }}/config"
        chmod 600 "{{ kubeconfig_dir }}/config"
      args:
        executable: /bin/bash
      changed_when: true
      tags: [kubeconfig]
