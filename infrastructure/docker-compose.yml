version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Local dev stack — run from the repo root:
#   docker compose -f infrastructure/docker-compose.yml up --build
#
# Services:
#   kafka            → apache/kafka-native in KRaft mode (no Zookeeper)
#   schema-registry  → Avro schema storage + validation
#   kafka-ui         → kafbat UI at http://localhost:8080
#   mailhog          → Fake SMTP at http://localhost:8025
#   gateway          → REST API at http://localhost:3000
#   email-service    → Kafka consumer, sends via MailHog
# ─────────────────────────────────────────────────────────────────────────────

networks:
  notifications:
    driver: bridge

volumes:
  kafka-data:

services:
  # ── Kafka (KRaft — no Zookeeper) ───────────────────────────────────────────
  kafka:
    image: apache/kafka-native:latest
    hostname: kafka
    container_name: notifications-kafka
    networks: [notifications]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 > /dev/null 2>&1"
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 15s

  # ── Schema Registry ────────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    container_name: notifications-schema-registry
    networks: [notifications]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:main
    container_name: notifications-kafka-ui
    networks: [notifications]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: "true"

  # ── MailHog ────────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: notifications-mailhog
    networks: [notifications]
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── Gateway ────────────────────────────────────────────────────────────────
  # Build context is the gateway service directory — fully self-contained
  gateway:
    build:
      context: ../gateway
    container_name: notifications-gateway
    networks: [notifications]
    depends_on:
      schema-registry:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    restart: unless-stopped

  # ── Email service ──────────────────────────────────────────────────────────
  email-service:
    build:
      context: ../email-service
    container_name: notifications-email-service
    networks: [notifications]
    depends_on:
      schema-registry:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      NODE_ENV: development
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_GROUP_ID: email-service-group
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: "notifications@example.com"
    restart: unless-stopped
