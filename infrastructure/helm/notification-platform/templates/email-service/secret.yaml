{{- if .Values.smtp.auth.enabled }}
# Placeholder Secret — replace data values with real base64-encoded credentials
# or provision via external-secrets / sealed-secrets before deploying.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.smtp.auth.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "np.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.smtp.auth.usernameKey }}: ""
  {{ .Values.smtp.auth.passwordKey }}: ""
{{- end }}
