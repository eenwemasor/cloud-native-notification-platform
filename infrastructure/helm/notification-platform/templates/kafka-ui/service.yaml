{{- if .Values.kafkaUI.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "np.labels" . | nindent 4 }}
    {{- include "np.selectorLabels" "kafka-ui" | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "np.selectorLabels" "kafka-ui" | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
