apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "np.labels" . | nindent 4 }}
  annotations:
    # Runs once after install/upgrade; Helm will track the Job lifecycle
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "np.labels" . | nindent 8 }}
        app: kafka-topic-init
    spec:
      serviceAccountName: notification-platform
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do echo 'waiting for kafka...'; sleep 3; done"]
      containers:
        - name: topic-init
          image: {{ .Values.kafka.image }}
          command:
            - sh
            - -c
            - |
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
                --create --if-not-exists \
                --topic email.notification \
                --partitions 3 \
                --replication-factor 1 && \
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
                --create --if-not-exists \
                --topic notifications.status \
                --partitions 3 \
                --replication-factor 1 && \
              echo "Topics created successfully."
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
