apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "np.labels" . | nindent 4 }}
    {{- include "np.selectorLabels" "schema-registry" | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "np.selectorLabels" "schema-registry" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "np.labels" . | nindent 8 }}
        {{- include "np.selectorLabels" "schema-registry" | nindent 8 }}
    spec:
      containers:
        - name: schema-registry
          image: {{ .Values.schemaRegistry.image }}
          ports:
            - containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: "schema-registry"
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
          resources:
            {{- toYaml .Values.schemaRegistry.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
