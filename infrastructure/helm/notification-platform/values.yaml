# ── Gateway ───────────────────────────────────────────────────────────────────
gateway:
  image:
    repository: notifications/gateway
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Email service ──────────────────────────────────────────────────────────────
emailService:
  image:
    repository: notifications/email-service
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

# ── Kafka (KRaft — no Zookeeper) ───────────────────────────────────────────────
kafka:
  image: apache/kafka-native:latest
  clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
  persistence:
    enabled: false
    storageClass: ""
    size: "5Gi"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ── Schema Registry ────────────────────────────────────────────────────────────
schemaRegistry:
  image: confluentinc/cp-schema-registry:7.6.0
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ── Kafka UI ───────────────────────────────────────────────────────────────────
kafkaUI:
  enabled: true
  image: ghcr.io/kafbat/kafka-ui:main
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  ingress:
    enabled: false
    host: kafka-ui.local

# ── Mailpit (fake SMTP for local dev — replaces abandoned MailHog) ────────────
mailhog:
  image: axllent/mailpit:v1.30.2
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  ingress:
    enabled: true
    host: mailhog.local

# ── SMTP config passed to email-service ───────────────────────────────────────
smtp:
  host: mailhog
  port: "1025"
  from: "notifications@example.com"
  auth:
    enabled: false
    # username and password are read from a Secret when auth.enabled is true.
    # Create the Secret manually or via external-secrets before deploying.
    secretName: smtp-credentials
    usernameKey: username
    passwordKey: password

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: notifications.local
