apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: notifications
  labels:
    app: email-service
spec:
  # Keep replicas <= numPartitions (3) to avoid idle consumers.
  # Each replica owns 1 partition, processing one message at a time per partition.
  replicas: 2
  selector:
    matchLabels:
      app: email-service
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
        - name: email-service
          image: notifications/email-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: email-service-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          # Consumer has no HTTP endpoint; use a process-alive check
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
      # Allow Kafka consumer group rebalance to complete before pod is killed
      terminationGracePeriodSeconds: 60
