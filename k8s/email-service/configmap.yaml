apiVersion: v1
kind: ConfigMap
metadata:
  name: email-service-config
  namespace: notifications
data:
  NODE_ENV: "production"
  KAFKA_BROKERS: "kafka:9092"
  SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
  KAFKA_GROUP_ID: "email-service-group"
  SMTP_HOST: "mailhog"
  SMTP_PORT: "1025"
  SMTP_FROM: "notifications@example.com"
