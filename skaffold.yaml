apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: notification-platform

build:
  local:
    push: true
  artifacts:
    - image: 192.168.252.1:5000/notifications/gateway
      context: gateway
      docker:
        dockerfile: Dockerfile
    - image: 192.168.252.1:5000/notifications/email-service
      context: email-service
      docker:
        dockerfile: Dockerfile

deploy:
  helm:
    releases:
      - name: notification-platform
        chartPath: infrastructure/helm/notification-platform
        namespace: notification-platform
        createNamespace: true
        setValueTemplates:
          gateway.image.repository: "{{.IMAGE_REPO_192_168_252_1_5000_notifications_gateway}}"
          gateway.image.tag: "{{.IMAGE_TAG_192_168_252_1_5000_notifications_gateway}}"
          gateway.image.pullPolicy: Always
          emailService.image.repository: "{{.IMAGE_REPO_192_168_252_1_5000_notifications_email_service}}"
          emailService.image.tag: "{{.IMAGE_TAG_192_168_252_1_5000_notifications_email_service}}"
          emailService.image.pullPolicy: Always